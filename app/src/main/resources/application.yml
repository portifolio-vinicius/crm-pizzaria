spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pizzaria
    username: pizzaria
    password: pizzaria
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: localhost
    port: 6379
